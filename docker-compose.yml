networks:
  infoindexer_net:
    driver: bridge

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 3G
    env_file:
      - ./docker/compose/base.env
    environment:
      - CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT=1
      - CLICKHOUSE_ADMIN_PASSWORD=${CLICKHOUSE_ADMIN_PASSWORD:-admin123}
      - CLICKHOUSE_WORKER_PASSWORD=${CLICKHOUSE_WORKER_PASSWORD:-worker123}
      - CLICKHOUSE_API_PASSWORD=${CLICKHOUSE_API_PASSWORD:-api123}
      - CLICKHOUSE_DISABLE_DEFAULT=${CLICKHOUSE_DISABLE_DEFAULT:-false}
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./docker/clickhouse-config.d/merge-tree-broken-parts.xml:/etc/clickhouse-server/config.d/merge-tree-broken-parts.xml:ro
      - ./docker/clickhouse-config.d/low-memory-merge-tree.xml:/etc/clickhouse-server/config.d/low-memory-merge-tree.xml:ro
      - ./docker/clickhouse-config.d/ssl.xml:/etc/clickhouse-server/config.d/ssl.xml:ro
      - ./docker/clickhouse-config.d/profiles.xml:/etc/clickhouse-server/config.d/profiles.xml:ro
      - ./docker/clickhouse-config.d/audit-log.xml:/etc/clickhouse-server/config.d/audit-log.xml:ro
      - ./docker/clickhouse-config.d/resource-guards.xml:/etc/clickhouse-server/config.d/resource-guards.xml:ro
      - ./docker/clickhouse-config.d/profiles-users.xml:/etc/clickhouse-server/config.d/profiles-users.xml:ro
      - ./docker/clickhouse-config.d/users.d/zzz-default-profile.xml:/etc/clickhouse-server/users.d/zzz-default-profile.xml:ro
      - clickhouse_certs:/etc/clickhouse-server/certs
    networks:
      - infoindexer_net
    ports:
      - "8123:8123"
      - "8443:8443"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  redis:
    image: redis:7.4-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - infoindexer_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  clickhouse-init:
    build:
      context: ./docker/clickhouse-init
      dockerfile: Dockerfile
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/clickhouse-init.env
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
    restart: "no"

  migration-worker:
    build:
      context: .
      dockerfile: apps/migration-worker/Dockerfile
    command: node apps/migration-worker/dist/index.js
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/migration.env
    environment:
      - MIGRATIONS_BASE_DIR=/app/packages/shared/infrastructure/migrations/files
      - MIGRATION_MODE=once
      - MIGRATION_AUTO_CLEANUP=${MIGRATION_AUTO_CLEANUP:-false}
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/migrations-completed && grep -q '\"success\":true' /tmp/migrations-completed || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 1
      start_period: 10s

  sync-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: node apps/sync-worker/dist/index.js
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/sync.env
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration-worker:
        condition: service_completed_successfully
    restart: unless-stopped

  egrul-sync-worker:
    build:
      context: .
      dockerfile: apps/egrul-sync-worker/Dockerfile
    command: node apps/egrul-sync-worker/dist/src/index.js
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/egrul.env
    environment:
      - SOCKS_PROXY_URL=${SOCKS_PROXY_URL:-}
      - BATCH_SIZE=${BATCH_SIZE:-10000}
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration-worker:
        condition: service_completed_successfully
    restart: unless-stopped

  admin-ui:
    build:
      context: .
      dockerfile: Dockerfile
    command: npm start --workspace=apps/admin-ui
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/admin.env
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration-worker:
        condition: service_completed_successfully
    ports:
      - "3140:3000"
    restart: unless-stopped

  contacts-parser:
    build:
      context: .
      dockerfile: Dockerfile.playwright
    env_file:
      - ./docker/compose/base.env
      - ./docker/compose/contacts.env
    networks:
      - infoindexer_net
    depends_on:
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse-init:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  clickhouse_data:
  clickhouse_certs:
  redis_data:
