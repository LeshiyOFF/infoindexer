name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --os=linux --cpu=x64

      - name: Lint
        run: npm run lint --workspaces --if-present

      - name: Type check shared package
        run: cd packages/shared && npx tsc --noEmit

      - name: Knip (dependencies & unresolved imports)
        run: npx knip --exclude files,exports,types,duplicates

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --os=linux --cpu=x64

      - name: Build shared package
        run: npm run build --workspace=packages/shared

      - name: Build admin-ui
        run: npm run build --workspace=apps/admin-ui
        env:
          NODE_ENV: production
