name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leshiyoff/infoindexer

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push admin-ui
      - name: Extract metadata for admin-ui
        id: meta-admin-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-admin-ui-
            type=raw,value=admin-ui-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-admin-ui

      - name: Build and push admin-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin-ui/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:admin-ui-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push contacts-parser
      - name: Extract metadata for contacts-parser
        id: meta-contacts
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-contacts-
            type=raw,value=contacts-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-contacts

      - name: Build and push contacts-parser
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.playwright
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:contacts-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push clickhouse-init
      - name: Build and push clickhouse-init
        uses: docker/build-push-action@v5
        with:
          context: ./docker/clickhouse-init
          file: ./docker/clickhouse-init/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:clickhouse-init-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push sync-worker
      - name: Extract metadata for sync-worker
        id: meta-sync
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push sync-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push egrul-sync-worker
      - name: Extract metadata for egrul-worker
        id: meta-egrul
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-egrul-
            type=raw,value=egrul-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-egrul

      - name: Build and push egrul-sync-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/egrul-sync-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:egrul-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push migration-worker
      - name: Extract metadata for migration-worker
        id: meta-migration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-migration-
            type=raw,value=migration-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-migration

      - name: Build and push migration-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/migration-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migration-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to server
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            #!/bin/bash
            set -euo pipefail

            # === Configuration ===
            DEPLOY_DIR="/root/infoindexer"
            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"
            PROJECT_NAME="infoindexer"
            CLICKHOUSE_TIMEOUT=60
            REDIS_TIMEOUT=30

            # === Helper Functions ===

            pull_latest_code() {
              echo "=== Pulling latest code ==="
              git config core.sshCommand "ssh -i /root/.ssh/deploy_github -o StrictHostKeyChecking=no"
              git fetch origin
              git reset --hard origin/master
              git clean -fd
            }

            pull_docker_images() {
              echo "=== Pulling Docker images ==="
              docker compose $COMPOSE_FILES pull
            }

            ensure_network_exists() {
              echo "=== Ensuring network exists ==="
              if ! docker network inspect "${PROJECT_NAME}_infoindexer_net" &>/dev/null; then
                docker network create "${PROJECT_NAME}_infoindexer_net"
              fi
            }

            configure_firewall() {
              echo "=== Configuring firewall ==="
              if command -v ufw >/dev/null 2>&1; then
                # Allow Admin UI port
                ufw allow 3140/tcp comment 'InfoIndexer Admin UI' >/dev/null 2>&1 || true
                echo "✓ Firewall configured (port 3140)"
              else
                echo "⚠ ufw not found - skipping firewall configuration"
              fi
            }

            graceful_shutdown() {
              echo "=== Graceful shutdown ==="
              docker compose $COMPOSE_FILES down --remove-orphans
            }

            start_core_services() {
              echo "=== Starting core services ==="
              docker compose $COMPOSE_FILES up -d clickhouse redis
            }

            wait_for_clickhouse() {
              echo "=== Waiting for ClickHouse (timeout: ${CLICKHOUSE_TIMEOUT}s) ==="

              timeout "$CLICKHOUSE_TIMEOUT"s bash -c "
                until docker compose $COMPOSE_FILES exec -T clickhouse clickhouse-client --query 'SELECT 1' &>/dev/null; do
                  sleep 1
                done
              " || {
                echo "❌ ClickHouse healthcheck failed"
                docker compose $COMPOSE_FILES logs --tail=50 clickhouse
                exit 1
              }

              echo "✅ ClickHouse is ready"
            }

            wait_for_redis() {
              echo "=== Waiting for Redis (timeout: ${REDIS_TIMEOUT}s) ==="

              timeout "$REDIS_TIMEOUT"s bash -c "
                until docker compose $COMPOSE_FILES exec -T redis redis-cli ping &>/dev/null; do
                  sleep 1
                done
              " || {
                echo "❌ Redis healthcheck failed"
                docker compose $COMPOSE_FILES logs --tail=50 redis
                exit 1
              }

              echo "✅ Redis is ready"
            }

            start_dependent_services() {
              echo "=== Starting dependent services ==="
              docker compose $COMPOSE_FILES up -d
            }

            verify_deployment() {
              echo "=== Verifying deployment ==="
              docker compose $COMPOSE_FILES ps
            }

            cleanup_old_images() {
              echo "=== Cleanup old images ==="
              docker image prune -af --filter "until=24h"
            }

            # === Main Orchestration ===
            main() {
              cd "$DEPLOY_DIR"

              pull_latest_code
              pull_docker_images
              ensure_network_exists
              configure_firewall
              graceful_shutdown
              start_core_services
              wait_for_clickhouse
              wait_for_redis
              start_dependent_services
              verify_deployment
              cleanup_old_images

              echo "✅ Deployment completed successfully"
            }

            main

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: false
          script: |
            #!/bin/bash
            set -euo pipefail

            DEPLOY_DIR="/root/infoindexer"
            COMPOSE_FILES="-f docker-compose.yml -f docker-compose.prod.yml"
            cd "$DEPLOY_DIR"

            echo "=== Service Status ==="
            docker compose $COMPOSE_FILES ps

            echo "=== Health Checks ==="

            # Check ClickHouse
            if docker compose $COMPOSE_FILES exec -T clickhouse clickhouse-client --query 'SELECT 1' &>/dev/null; then
              echo "✅ ClickHouse: OK"
            else
              echo "❌ ClickHouse: not ready"
              exit 1
            fi

            # Check Redis
            if docker compose $COMPOSE_FILES exec -T redis redis-cli ping &>/dev/null; then
              echo "✅ Redis: OK"
            else
              echo "❌ Redis: not ready"
              exit 1
            fi

            # Check Admin UI (may still be starting, don't fail)
            if curl -f http://localhost:3140/ &>/dev/null; then
              echo "✅ Admin UI: OK"
            else
              echo "⚠️  Admin UI: not ready yet (will start shortly)"
            fi

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "=== Deploy failed! Last 50 lines of logs ==="
            cd /root/infoindexer
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50
