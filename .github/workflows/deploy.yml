name: Deploy to Production

on:
  workflow_run:
    workflows: ["Docker Build"]
    types: [completed]
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            set -e

            cd /root/infoindexer

            # Pull latest code
            git fetch origin
            git reset --hard origin/master

            # Pull latest images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Restart services
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Cleanup old images
            docker image prune -af --filter "until=24h"

            echo "Deploy completed at $(date)"
          ENDSSH

      - name: Health check
        run: |
          sleep 15
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd /root/infoindexer
            docker compose ps

            # Check ClickHouse
            echo "Checking ClickHouse..."
            docker exec infoindexer-clickhouse-1 clickhouse-client --query "SELECT 1"

            # Check Redis
            echo "Checking Redis..."
            docker exec infoindexer-redis-1 redis-cli ping

            # Check API
            echo "Checking Admin UI..."
            curl -f http://localhost:3140/api/health || echo "API not responding yet"
          ENDSSH

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deploy failed! Check logs on server."
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'ENDSSH'
            cd /root/infoindexer
            docker compose logs --tail=50
          ENDSSH
