name: Deploy to Server

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: leshiyoff/infoindexer

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push admin-ui
      - name: Extract metadata for admin-ui
        id: meta-admin-ui
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-admin-ui-
            type=raw,value=admin-ui-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-admin-ui

      - name: Build and push admin-ui
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/admin-ui/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:admin-ui-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push contacts-parser
      - name: Extract metadata for contacts-parser
        id: meta-contacts
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-contacts-
            type=raw,value=contacts-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-contacts

      - name: Build and push contacts-parser
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.playwright
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:contacts-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push clickhouse-init
      - name: Build and push clickhouse-init
        uses: docker/build-push-action@v5
        with:
          context: ./docker/clickhouse-init
          file: ./docker/clickhouse-init/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:clickhouse-init-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push sync-worker
      - name: Extract metadata for sync-worker
        id: meta-sync
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push sync-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push egrul-sync-worker
      - name: Extract metadata for egrul-worker
        id: meta-egrul
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-egrul-
            type=raw,value=egrul-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-egrul

      - name: Build and push egrul-sync-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/egrul-sync-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:egrul-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and push migration-worker
      - name: Extract metadata for migration-worker
        id: meta-migration
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-migration-
            type=raw,value=migration-latest,enable={{is_default_branch}}
          flavor: |
            suffix=-migration

      - name: Build and push migration-worker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/migration-worker/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:migration-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Deploy to server
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            cd /root/infoindexer

            # Pull latest code from git
            echo "Updating code..."
            git config core.sshCommand "ssh -i /root/.ssh/deploy_github -o StrictHostKeyChecking=no"
            git fetch origin
            git reset --hard origin/master
            git checkout -- .
            git clean -fd

            # Debug: check files
            echo "=== File diagnostics ==="
            ls -la docker-compose*.yml
            wc -l docker-compose*.yml
            echo "=== Last 20 lines of docker-compose.yml ==="
            tail -20 docker-compose.yml
            echo "=== Git status ==="
            git status
            echo "=== Git diff docker-compose.yml ==="
            git diff HEAD docker-compose.yml | head -50 || echo "No diff"
            echo "=== Force checkout file ==="
            git checkout -f origin/master -- docker-compose.yml
            echo "=== New size ==="
            ls -la docker-compose.yml

            # Pull latest images from GHCR
            echo "Pulling latest images..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull

            # Restart services
            echo "Restarting services..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

            # Cleanup old images
            docker image prune -af --filter "until=24h"

            # Show status
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

      - name: Health check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script_stop: false
          script: |
            sleep 10

            echo "=== Service Status ==="
            cd /root/infoindexer
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            echo "=== Health Checks ==="

            # Check Redis
            echo "Redis: $(docker exec infoindexer-redis-1 redis-cli ping 2>/dev/null || echo 'not ready')"

            # Check Admin UI
            curl -f http://localhost:3140/ && echo "Admin UI: OK" || echo "Admin UI: not ready yet"

      - name: Notify on failure
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            echo "=== Deploy failed! Last 50 lines of logs ==="
            cd /root/infoindexer
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail=50
