name: Diagnose Server

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Diagnose server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: 22
          script: |
            #!/bin/bash
            cd /root/infoindexer

            echo "=== Container Status ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

            echo ""
            echo "=== Admin UI Logs (last 30 lines) ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml logs admin-ui --tail=30

            echo ""
            echo "=== Listening Ports ==="
            netstat -tlnp | grep -E "(3140|3000)" || echo "No ports found"

            echo ""
            echo "=== Admin UI Container Inspect ==="
            docker inspect infoindexer-admin-ui-1 --format='{{.State.Status}}: {{.State.Health}}' 2>/dev/null || echo "Container not found"
