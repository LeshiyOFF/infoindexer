# Production override - uses pre-built images from GHCR
# Principle: Minimal override - only image replacements
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

networks:
  infoindexer_net:
    driver: bridge

services:
  clickhouse:
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      # Config.d: system settings (excluding SSL which requires certificates)
      - ./docker/clickhouse-config.d/02-query-limits.xml:/etc/clickhouse-server/config.d/02-query-limits.xml:ro
      - ./docker/clickhouse-config.d/03-join-settings.xml:/etc/clickhouse-server/config.d/03-join-settings.xml:ro
      - ./docker/clickhouse-config.d/04-low-memory-merge-tree.xml:/etc/clickhouse-server/config.d/04-low-memory-merge-tree.xml:ro
      - ./docker/clickhouse-config.d/audit-log.xml:/etc/clickhouse-server/config.d/05-audit-log.xml:ro
      - ./docker/clickhouse-config.d/merge-tree-broken-parts.xml:/etc/clickhouse-server/config.d/06-broken-parts.xml:ro
      # Users.d: user profiles and quotas
      - ./docker/clickhouse-config.d/01-base-profiles.xml:/etc/clickhouse-server/users.d/01-profiles.xml:ro
      - ./docker/clickhouse-config.d/05-quotas.xml:/etc/clickhouse-server/users.d/02-quotas.xml:ro
    # Note: 07-ssl.xml excluded - certificates not installed

  clickhouse-init:
    image: ghcr.io/leshiyoff/infoindexer:clickhouse-init-latest

  sync-worker:
    image: ghcr.io/leshiyoff/infoindexer:latest

  egrul-sync-worker:
    image: ghcr.io/leshiyoff/infoindexer:egrul-latest

  admin-ui:
    image: ghcr.io/leshiyoff/infoindexer:admin-ui-latest

  contacts-parser:
    image: ghcr.io/leshiyoff/infoindexer:contacts-latest

  migration-worker:
    image: ghcr.io/leshiyoff/infoindexer:migration-latest
